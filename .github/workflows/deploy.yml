name: Deploy to AUR

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest Polaris version
        run: |
          set -e

          LATEST_VER=$(curl -s https://api.github.com/repos/papi-ux/polaris/releases/latest | jq -r '.tag_name')
          echo "Latest release: $LATEST_VER"

          VERSION="${LATEST_VER#v}"

          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD

      - name: Ensure clean tree (IMPORTANT)
        run: |
          # remove any accidental binaries or downloads
          find . -maxdepth 1 -type f -name "*.pkg.tar.zst" -delete || true
          find . -maxdepth 1 -type f -name "*.tar.*" -delete || true

      - name: Regenerate .SRCINFO
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: polaris-gamestream-bin
          pkgbuild: ./PKGBUILD
          assets: |
            PKGBUILD
            .SRCINFO
            polaris-gamestream-bin.install
          SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_username: ${{ secrets.AUR_COMMIT_USERNAME }}
          commit_email: ${{ secrets.AUR_COMMIT_EMAIL }}
          updpkgsums: true
