name: Deploy to AUR

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest Polaris version
        id: version
        run: |
          set -e

          LATEST_VER=$(curl -s https://api.github.com/repos/papi-ux/polaris/releases/latest | jq -r '.tag_name')
          echo "Latest release: $LATEST_VER"

          VERSION="${LATEST_VER#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD version
        run: |
          set -e

          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" PKGBUILD

      - name: Clean build artifacts (important)
        run: |
          rm -f *.pkg.tar.zst || true

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: polaris-gamestream-bin
          pkgbuild: ./PKGBUILD

          assets: |
            PKGBUILD
            polaris-gamestream-bin.install
            .SRCINFO

          SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_username: ${{ secrets.AUR_COMMIT_USERNAME }}
          commit_email: ${{ secrets.AUR_COMMIT_EMAIL }}

          updpkgsums: true
          allow_empty_commits: false
          force_push: false
