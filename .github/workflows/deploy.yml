name: Deploy to AUR

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version
        run: |
          set -e
          LATEST_VER=$(curl -s https://api.github.com/repos/papi-ux/polaris/releases/latest | jq -r '.tag_name')
          echo "Latest release: $LATEST_VER"
          VERSION="${LATEST_VER#v}"
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD

      - name: Ensure NO binary leakage (IMPORTANT)
        run: |
          rm -rf *.pkg.tar.zst *.tar.* *.zip || true
          git clean -fdx

      - name: Deploy to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: polaris-gamestream-bin
          pkgbuild: ./PKGBUILD
          assets: |
            PKGBUILD
            .SRCINFO
            polaris-gamestream-bin.install
          SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_username: ${{ secrets.AUR_COMMIT_USERNAME }}
          commit_email: ${{ secrets.AUR_COMMIT_EMAIL }}
          updpkgsums: false
          allow_empty_commits: false
